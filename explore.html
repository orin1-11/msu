<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="color-scheme" content="light"><title>MSU Wallet Explorer</title><link rel="stylesheet" href="css/nav.css"><link rel="stylesheet" href="css/wallet.css"><link rel="stylesheet" href="css/explore-theme.css"><link rel="stylesheet" href="css/theme.css"></head><body><div class="wrap explorer-wrap" id="appRoot"><div id="siteNavMount"></div><div style="margin-bottom:4px"><h1>MSU Explorer</h1></div><p class="sub">Browse wallet transactions — items, amounts, marketplace activity and more.</p><div class="card"><div class="card-title">Search</div><div class="search-row explorer-search-row"><input id="walletInput" type="text" placeholder="Paste wallet address..." spellcheck="false" autocomplete="off" autocapitalize="off" inputmode="text" value=""> <button class="btn" id="fetchBtn" onclick="loadFirstPage()">Load</button></div><div id="status"></div></div><div id="results" class="hidden"><div class="card"><div class="explorer-filter-bar"><div class="filter-row" id="filterRow"><button class="pill active" data-filter="all">All</button> <button class="pill" data-filter="marketplace">Marketplace</button> <button class="pill" data-filter="power">Power Crystal</button> <button class="pill" data-filter="swap">Deposit / Withdraw</button> <button class="pill" data-filter="mint">Mint</button> <button class="pill" data-filter="transfer">Transfer</button> <button class="pill" data-filter="token">NESO Transfer</button></div><input id="searchInput" class="filter-search" type="text" placeholder="Search address, tx hash, item..." oninput="renderExplorerTable()"></div></div><div class="card"><div class="explorer-table-head"><div class="card-title" style="margin-bottom:0">Transactions</div><div class="pager-row"><button class="btn-sm" id="prevBtn" onclick="loadPrevPage()" disabled="disabled">Previous</button> <span id="pageLabel">Page 1</span> <button class="btn-sm" id="nextBtn" onclick="loadNextPage()" disabled="disabled">Next</button></div></div><div style="overflow-x:auto"><table class="tx-table explorer-table"><thead><tr><th style="width:90px">Time</th><th style="width:90px">Action</th><th style="width:48px">Item</th><th style="width:50px">Qty</th><th style="width:150px">Amount</th><th style="width:190px">From → To</th><th style="width:140px">Tx Hash</th></tr></thead><tbody id="txBody"></tbody></table><div style="display:flex;justify-content:space-between;align-items:center;margin-top:12px"><label class="show-per-page-label">Show<div class="custom-select" id="displaySizeWrap"><span class="custom-select-val" id="displaySizeVal">10</span><svg class="custom-select-arrow" viewBox="0 0 10 6" fill="none"><path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg><ul class="custom-select-opts" id="displaySizeOpts"><li data-val="10" class="active">10</li><li data-val="20">20</li><li data-val="50">50</li><li data-val="100">100</li></ul></div>per page</label><div class="pager-row"><button class="btn-sm" id="prevBtn2" onclick="loadPrevPage()" disabled="disabled">Previous</button> <span id="pageLabel2">Page 1</span> <button class="btn-sm" id="nextBtn2" onclick="loadNextPage()" disabled="disabled">Next</button></div></div></div></div></div></div><script src="js/theme.js"></script><script src="js/nav.js"></script><script>renderSiteNav('explore');</script><script src="js/glacier.js"></script><script type="module" src="js/explore.js"></script></body></html>
