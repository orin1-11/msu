<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Arcane Symbol Calculator</title>
<style>
  body {
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    background-color: #f9fafb; /* soft light background */
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
 }
  .calculator-card {
    background-color: #ffffff; /* white card */
    color: #111827; /* dark text */
    padding: 35px 30px;
    border-radius: 12px;
    width: 400px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    border: 1px solid #e5e7eb;
  }
  h1 {
    font-family: inherit; /* uses same system font as body */
    font-weight: bold; /* keeps it prominent */
    text-align: center;
    font-size: 1.8em;
    margin-bottom: 20px;
    color: #22d3ee; /* Arcane cyan */
 }
  .level-row {
    display: flex;
    gap: 10px;
  }
  .level-row div {
    flex: 1;
  }
  .level-row label {
    font-weight: bold;
    display: block;
    margin-bottom: 5px;
  }
  select {
    width: 100%;
    padding: 6px;
    border-radius: 5px;
    border: 1px solid #d1d5db;
    background: #ffffff;
    color: #111827;
  }
  select:hover {
    background: #f3f4f6;
  }
  label.slider-label {
    font-weight: bold;
    margin-top: 20px;
    display: block;
  }
  input[type=range] {
    width: 100%;
    margin-top: 5px;
    -webkit-appearance: none;
    height: 6px;
    background: #e5e7eb;
    border-radius: 5px;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    height: 18px;
    width: 18px;
    border-radius: 50%;
    background: #22d3ee; /* Arcane cyan thumb */
    cursor: pointer;
  }
  .slider-value {
    text-align: center;
    font-weight: bold;
    margin-top: 5px;
    margin-bottom: 15px;
    color: #22d3ee; /* Arcane cyan */
  }
  .result-card {
    background: #f3f4f6;
    border-radius: 12px;
    padding: 20px;
    text-align: center;
    margin-top: 25px;
    border: 2px solid #22d3ee; /* Arcane cyan border */
    box-shadow: 0 2px 10px rgba(34,211,238,0.5);
  }
  .result-card div {
    margin: 10px 0;
    font-size: 1.4em;
    font-weight: bold;
    color: #111827;
  }
</style>
</head>
<body>

<div class="calculator-card">
  <h1>Arcane Symbol Calculator</h1>

  <!-- Current & Target Level -->
  <div class="level-row">
    <div>
      <label for="currentLevel">Current Level</label>
      <select id="currentLevel"></select>
    </div>
    <div>
      <label for="targetLevel">Target Level</label>
      <select id="targetLevel"></select>
    </div>
  </div>

  <!-- Current Symbols Slider -->
  <label class="slider-label" for="currentSymbols">Current Symbols at this Level</label>
  <div class="slider-value" id="currentSymbolsValue">0</div>
  <input type="range" id="currentSymbols" min="0" value="0">

  <!-- Result Box -->
  <div class="result-card">
    <div>Symbols Needed: <span id="neededSymbols">0</span></div>
    <div>Neso Needed: <span id="neededNeso">0</span></div>
  </div>
</div>

<script>
// Arcane Symbol costs
const arcaneCosts = [12,15,20,27,36,47,60,75,92,111,132,155,180,207,236,267,300,335,372];
const NesoCosts = [
  227000, 308000, 392000, 479000, 573000, 674000, 784000, 904000,
  1037000, 1184000, 1345000, 1525000, 1721000, 1936000, 2174000,
  2417000, 2684000, 2969000, 3273000
];

const currentLevelSelect = document.getElementById('currentLevel');
const targetLevelSelect = document.getElementById('targetLevel');
const currentSymbolsSlider = document.getElementById('currentSymbols');
const currentSymbolsValue = document.getElementById('currentSymbolsValue');
const neededSymbolsSpan = document.getElementById('neededSymbols');
const neededNesoSpan = document.getElementById('neededNeso');

// Populate levels
for (let i = 1; i <= 20; i++) {
  currentLevelSelect.innerHTML += `<option value="${i}">${i}</option>`;
  targetLevelSelect.innerHTML += `<option value="${i}">${i}</option>`;
}

// Auto adjust target
function updateTargetOptions() {
  const currentLevel = parseInt(currentLevelSelect.value);
  for (let i = 0; i < targetLevelSelect.options.length; i++) {
    const opt = targetLevelSelect.options[i];
    opt.disabled = parseInt(opt.value) <= currentLevel;
  }
  if (parseInt(targetLevelSelect.value) <= currentLevel) {
    targetLevelSelect.value = currentLevel + 1 <= 20 ? currentLevel + 1 : 20;
  }
}

// Calculate symbols & Neso needed
function calculateNeeded() {
  let currentLevel = parseInt(currentLevelSelect.value);
  let targetLevel = parseInt(targetLevelSelect.value);
  let currentSymbols = parseInt(currentSymbolsSlider.value);

  if (targetLevel <= currentLevel) {
    neededSymbolsSpan.textContent = "0";
    neededNesoSpan.textContent = "0";
    return;
  }

  let totalSymbols = 0;
  let totalNeso = 0;
  for (let i = currentLevel - 1; i < targetLevel - 1; i++) {
    totalSymbols += arcaneCosts[i];
    totalNeso += NesoCosts[i];
  }

  let remainingSymbols = totalSymbols - currentSymbols;
  neededSymbolsSpan.textContent = remainingSymbols > 0 ? remainingSymbols : 0;
  neededNesoSpan.textContent = totalNeso.toLocaleString();
}

// Event listeners
currentSymbolsSlider.addEventListener('input', () => {
  currentSymbolsValue.textContent = currentSymbolsSlider.value;
  calculateNeeded();
});

currentLevelSelect.addEventListener('change', () => {
  let levelIndex = parseInt(currentLevelSelect.value) - 1;
  currentSymbolsSlider.max = arcaneCosts[levelIndex];
  if (parseInt(currentSymbolsSlider.value) > arcaneCosts[levelIndex]) {
    currentSymbolsSlider.value = arcaneCosts[levelIndex];
    currentSymbolsValue.textContent = arcaneCosts[levelIndex];
  }
  updateTargetOptions();
  calculateNeeded();
});

targetLevelSelect.addEventListener('change', calculateNeeded);

// Initial setup
currentSymbolsSlider.max = arcaneCosts[0];
updateTargetOptions();
calculateNeeded();
</script>

</body>
</html>
